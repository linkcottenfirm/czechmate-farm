backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    folder: "_products"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Product Name", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["hay", "shavings", "grain", "other"]}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Price", name: "price", widget: "string", required: false, hint: "e.g., $8/bale or leave blank for 'Call for pricing'"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "In Stock", name: "instock", widget: "boolean", default: true}
